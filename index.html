<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>希腊神话神谱 — Theogony</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { overflow: hidden; background: #0a0a12; color: #e0e0e0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      #app { width: 100vw; height: 100vh; }
      canvas { display: block; }

      /* Name label (CSS2D) */
      .god-label {
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
        pointer-events: none;
        user-select: none;
        text-align: center;
        line-height: 1.3;
        transition: opacity 0.3s;
      }
      .god-label .sub {
        font-size: 10px;
        font-weight: 400;
        opacity: 0.7;
        display: block;
      }
      .god-label.dimmed { opacity: 0.2; }

      /* Info Panel */
      #info-panel {
        position: fixed;
        top: 24px;
        right: 24px;
        width: 280px;
        background: rgba(10, 10, 18, 0.82);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 20px 24px;
        opacity: 0;
        transform: translateY(-12px);
        transition: opacity 0.4s ease, transform 0.4s ease;
        pointer-events: none;
        z-index: 10;
      }
      #info-panel.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      #info-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
      #info-panel .en { font-size: 13px; color: #888; margin-bottom: 4px; }
      #info-panel .title { font-size: 14px; color: #c8a86e; margin-bottom: 12px; }
      #info-panel .desc { font-size: 13px; line-height: 1.6; color: #bbb; margin-bottom: 12px; }
      #info-panel .relations { font-size: 12px; color: #777; }
      #info-panel .relations span { color: #aaa; }

      /* Controls hint */
      #controls-hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(255,255,255,0.3);
        text-align: center;
        z-index: 10;
        pointer-events: none;
        letter-spacing: 0.5px;
      }

      /* Loading */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a12;
        z-index: 100;
        transition: opacity 0.8s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading span {
        font-size: 18px;
        color: #c8a86e;
        font-weight: 300;
        letter-spacing: 4px;
      }
    </style>
  </head>
  <body>
    <div id="loading"><span>神谱加载中…</span></div>
    <div id="app"></div>

    <div id="info-panel">
      <h2 id="ip-name"></h2>
      <div class="en" id="ip-en"></div>
      <div class="title" id="ip-title"></div>
      <div class="desc" id="ip-desc"></div>
      <div class="relations" id="ip-parents"></div>
      <div class="relations" id="ip-children"></div>
    </div>

    <div id="controls-hint">🖱 滚轮缩放 · 拖拽旋转 · 点击神祇查看详情</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
